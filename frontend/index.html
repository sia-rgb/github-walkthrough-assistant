<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub 项目 Walkthrough 助手</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <h1>GitHub 项目 Walkthrough 助手</h1>
    <div class="topbar-controls">
      <form id="analyzeForm" class="repo-form">
        <input id="repoUrlInput" type="url" required placeholder="https://github.com/karpathy/nanochat">
        <button type="submit">分析</button>
      </form>
      <select id="outputSelect" class="output-select">
        <option value="">📂 加载已有结果...</option>
      </select>
    </div>
  </header>

  <main class="workspace">
    <aside id="overviewPane" class="overview-pane" aria-label="项目概览">
      <h2>项目概览</h2>
      <div id="overviewContent" class="markdown empty-state">等待分析结果</div>
    </aside>

    <div class="content-column">
      <section id="readmePane" class="readme-pane" aria-label="README 中文翻译和术语注释">
        <div class="readme-toolbar">
          <h2>README 中文翻译与术语注释</h2>
        </div>
        <article id="readmeContent" class="markdown empty-state">输入 GitHub 仓库 URL 后开始分析</article>
      </section>

      <section id="plainExplainPane" class="plain-explain-pane" aria-label="大白话说明">
        <div class="plain-explain-toolbar">
          <h2>大白话说明</h2>
          <button id="plainExplainButton" type="button">生成说明</button>
        </div>
        <div id="plainExplainContent" class="markdown empty-state">选中 README 中的文本后点击上方"生成说明"按钮</div>
      </section>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
